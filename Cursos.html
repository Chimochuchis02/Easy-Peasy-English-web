<link rel="icon" type="icon/x-icon" href="/public/img/Limoncillo.jpg">
<div include-html="Layouts/header.html"></div>

<main class="text-center" style="padding-top: 130px;">

    <!-- Tab Navigation -->
    <div class="container position-relative z-3 text-center">
        <div class="custom-tabs-container flex-column flex-md-row">
            <ul class="nav nav-pills mb-0 flex-nowrap" id="cursos-tab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="presencial-tab" data-bs-toggle="pill"
                        data-bs-target="#presencial" type="button" role="tab" aria-selected="true">CURSOS
                        PRESENCIALES</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="linea-tab" data-bs-toggle="pill" data-bs-target="#linea" type="button"
                        role="tab" aria-selected="false">CURSOS EN LÍNEA</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="verano-tab" data-bs-toggle="pill" data-bs-target="#verano"
                        type="button" role="tab" aria-selected="false">
                        <span>CURSOS PRESENCIALES:<br>VERANO</span>
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="invierno-tab" data-bs-toggle="pill" data-bs-target="#invierno"
                        type="button" role="tab" aria-selected="false">
                        <span>CURSOS EN LÍNEA:<br>INVIERNO/VERANO</span>
                    </button>
                </li>
            </ul>
        </div>
    </div>

    <!-- Tab Content -->
    <div class="tab-content text-start" id="cursos-tabContent" style="margin-top: -3.5rem;">

        <!-- Tab 1: Cursos Presenciales -->
        <div class="tab-pane fade show active" id="presencial" role="tabpanel" aria-labelledby="presencial-tab"
            tabindex="0">
            <section class="w-100 position-relative overflow-hidden"
                style="background-color: #00AEEF; min-height: 80vh; padding-top: 10rem; padding-bottom: 4rem;">
                <!-- Decorative Shapes -->
                <div class="position-absolute blob-shape"
                    style="width: 300px; height: 350px; background-color: #FF1493; bottom: 5%; left: -2%; opacity: 0.9;">
                </div>
                <div class="position-absolute rounded-circle"
                    style="width: 450px; height: 450px; background-color: #FFD43B; bottom: -15%; right: 35%; opacity: 0.9;">
                </div>
                <div class="position-absolute rounded-pill"
                    style="width: 150px; height: 40px; background-color: #FF8C00; top: 25%; left: 2%; transform: rotate(20deg); opacity: 0.9;">
                </div>

                <div class="container position-relative z-2">
                    <div class="row align-items-center">
                        <div class="col-lg-7 text-white mb-5 mb-lg-0">
                            <h1 class="display-3 fw-bold mb-3" style="font-family: 'Nunito', sans-serif;">Explore,
                                Learn, Joy!</h1>
                            <h3 class="fw-normal">Cursos presenciales bimestrales</h3>
                        </div>
                        <div class="col-lg-5 text-center position-relative">
                            <img src="public/img/Happy_House.jpeg" class="img-fluid rounded-4 shadow-lg transform-hover"
                                alt="Cursos presenciales"
                                style="max-height: 450px; object-fit: cover; border: 8px solid transparent; box-shadow: 0 0 0 8px rgba(255,255,255,0.2);">
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Tab 2: Cursos en Línea -->
        <div class="tab-pane fade" id="linea" role="tabpanel" aria-labelledby="linea-tab" tabindex="0">
            <section class="w-100 position-relative overflow-hidden"
                style="background-color: #F78E1E; min-height: 80vh; padding-top: 10rem; padding-bottom: 4rem;">
                <!-- Decorative Shapes -->
                <div class="position-absolute blob-shape-alt"
                    style="width: 350px; height: 350px; background-color: #FF1493; top: -5%; left: -5%; opacity: 0.9;">
                </div>
                <div class="position-absolute rounded-pill"
                    style="width: 200px; height: 45px; background-color: #00AEEF; top: 35%; left: 5%; transform: rotate(-15deg); opacity: 0.9;">
                </div>
                <div class="position-absolute rounded-circle"
                    style="width: 500px; height: 500px; background-color: #00AEEF; bottom: -25%; right: 35%; opacity: 1;">
                </div>
                <div class="position-absolute rounded-circle"
                    style="width: 80px; height: 80px; background-color: #FF1493; bottom: 25%; right: 43%; z-index: 1;">
                </div>

                <div class="container position-relative z-2">
                    <div class="row align-items-center">
                        <div class="col-lg-7 text-white mb-5 mb-lg-0">
                            <h1 class="display-3 fw-bold mb-3" style="font-family: 'Nunito', sans-serif;">Online
                                Adventures!</h1>
                            <h3 class="fw-normal">Cursos en línea bimestrales</h3>
                        </div>
                        <div class="col-lg-5 text-center position-relative">
                            <img src="public/img/Happy_House_01.jpeg"
                                class="img-fluid rounded-4 shadow-lg transform-hover" alt="Cursos en línea"
                                style="max-height: 450px; object-fit: cover; border: 8px solid transparent; box-shadow: 0 0 0 8px rgba(255,255,255,0.2);">
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Tab 3: Cursos de Verano -->
        <div class="tab-pane fade" id="verano" role="tabpanel" aria-labelledby="verano-tab" tabindex="0">
            <section class="w-100 position-relative overflow-hidden"
                style="background-color: #FF1493; min-height: 80vh; padding-top: 10rem; padding-bottom: 4rem;">
                <!-- Decorative Shapes -->
                <div class="position-absolute rounded-circle"
                    style="width: 350px; height: 350px; background-color: #FFD43B; bottom: 10%; right: -10%; opacity: 0.9;">
                </div>
                <div class="position-absolute blob-shape"
                    style="width: 300px; height: 300px; background-color: #00AEEF; top: 15%; left: 5%; opacity: 0.9;">
                </div>
                <div class="position-absolute rounded-circle"
                    style="width: 60px; height: 60px; background-color: #F78E1E; top: 40%; right: 40%; opacity: 0.9;">
                </div>

                <div class="container position-relative z-2">
                    <div class="row align-items-center">
                        <div class="col-lg-7 text-white mb-5 mb-lg-0">
                            <h1 class="display-3 fw-bold mb-3" style="font-family: 'Nunito', sans-serif;">Summer Fun!
                            </h1>
                            <h3 class="fw-normal">Cursos presenciales de verano</h3>
                        </div>
                        <div class="col-lg-5 text-center position-relative">
                            <img src="public/img/Happy_House_02.jpeg"
                                class="img-fluid rounded-4 shadow-lg transform-hover" alt="Cursos de verano"
                                style="max-height: 450px; object-fit: cover; border: 8px solid transparent; box-shadow: 0 0 0 8px rgba(255,255,255,0.2);">
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Tab 4: Cursos de Invierno -->
        <div class="tab-pane fade" id="invierno" role="tabpanel" aria-labelledby="invierno-tab" tabindex="0">
            <section class="w-100 position-relative overflow-hidden"
                style="background-color: #FFD43B; min-height: 80vh; padding-top: 10rem; padding-bottom: 4rem;">
                <!-- Decorative Shapes -->
                <div class="position-absolute blob-shape-alt"
                    style="width: 400px; height: 400px; background-color: #FF1493; top: 5%; right: 5%; opacity: 0.8;">
                </div>
                <div class="position-absolute rounded-circle"
                    style="width: 250px; height: 250px; background-color: #00AEEF; bottom: -5%; left: 10%; opacity: 0.9;">
                </div>

                <div class="container position-relative z-2">
                    <div class="row align-items-center">
                        <div class="col-lg-7 mb-5 mb-lg-0" style="color: #333;">
                            <h1 class="display-3 fw-bold mb-3" style="font-family: 'Nunito', sans-serif;">Winter /
                                Summer Online!</h1>
                            <h3 class="fw-normal">Cursos de temporada en línea</h3>
                        </div>
                        <div class="col-lg-5 text-center position-relative">
                            <img src="public/img/Happy_House_03.jpeg"
                                class="img-fluid rounded-4 shadow-lg transform-hover" alt="Cursos de invierno"
                                style="max-height: 450px; object-fit: cover; border: 8px solid transparent; box-shadow: 0 0 0 8px rgba(255,255,255,0.4);">
                        </div>
                    </div>
                </div>
            </section>
        </div>

    </div>
</main>
